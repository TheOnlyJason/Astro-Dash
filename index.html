<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Run</title>
		<style>
			body { margin: 0; }
		</style>
	</head>
	<body>
		<script type="module" src="/main.js"></script>
	</body>
</html>

<div id="loadingScreen" style="
    display: none; 
    position: fixed; 
    top: 0; 
    right: 0; 
    width: 300px; 
    height: 100px; 
    background-color: rgba(0, 0, 0, 0.8); 
    color: white; 
    font-size: 18px; 
    padding: 10px; 
    z-index: 1000;
    border-bottom-left-radius: 10px;
    font-family: 'Arial', sans-serif; 
    text-align: center;
">
    <p style="margin: 0;">Game Paused</p>
	<p></p>
    <p style="margin: 0;">Press P to Resume</p>
</div>

<div id="startingScreen" style="
    display: block; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    width: 400px; 
    height: 200px; 
    background-color: rgba(0, 0, 0, 0.9); 
    color: white; 
    font-size: 24px; 
    padding: 20px; 
    z-index: 1000;
    border-radius: 10px;
    font-family: 'Arial', sans-serif; /* Custom font */
    text-align: center;
">
    <p style="margin: 0;">Welcome to the Game! Press Space to Start</p>
    <!-- <p style="margin: 10px 0;"></p> -->
</div>


<div id="score" style=
	"position: absolute; 
	top: 10px; 
	left: 10px; 
	font-size: 24px; 
	color: white; 
	font-family: Arial, sans-serif; 
	z-index: 1;">
	Score: 0
</div>
  
<div id="endingScreen" style="display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); color: white; display: flex; justify-content: center; align-items: center; flex-direction: column; font-size: 2em;">
<p>Congratulations! You Won!</p>
</div>
